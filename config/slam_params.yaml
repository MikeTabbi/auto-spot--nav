slam_toolbox:
  ros__parameters:
    odom_frame: spot/odom
    map_frame: map
    base_frame: spot/body
    scan_topic: /scan
    use_scan_matching: true
    max_laser_range: 10.0
    resolution: 0.05
    minimum_travel_distance: 0.3
    minimum_travel_heading: 0.3
    map_update_interval: 3.0
    mode: mapping
